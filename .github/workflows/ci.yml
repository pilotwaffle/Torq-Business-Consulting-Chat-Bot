name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # ANTHROPIC_API_KEY is intentionally absent here: this CI build is a
      # compile-only smoke check. The build succeeds and bundles a literal
      # `undefined` for the key. Do not add a dummy key.
      - name: Build
        run: npm run build
